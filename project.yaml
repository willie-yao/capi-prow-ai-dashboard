# Project config for the CAPI core Prow dashboard.
# Consumed by the prow-ai-dashboard engine via .github/workflows/deploy.yml.

id: capi
name: "Cluster API"
short_name: "CAPI"

# Where in kubernetes/test-infra to find the prow job YAMLs.
source:
  test_infra_path: "config/jobs/kubernetes-sigs/cluster-api"
  file_prefix: "cluster-api-"

# Only jobs that advertise this testgrid dashboard are included.
# Release-branch periodics (cluster-api-core-1.X) are filtered out.
testgrid:
  dashboard: "cluster-api-core-main"

# Job grouping. Rules are evaluated in order; first lowercase substring match
# wins. "mink8s" comes before "e2e" so mink8s jobs surface as their own lane.
categories:
  - match: "conformance"
    id: "conformance"
    label: "Conformance"
  - match: "upgrade"
    id: "upgrade"
    label: "Upgrade"
  - match: "mink8s"
    id: "mink8s"
    label: "Min K8s"
  - match: "e2e"
    id: "e2e"
    label: "E2E"
  - match: "test"
    id: "unit"
    label: "Unit / Integration"

# Display order for category sections on the landing page.
category_display_order:
  - e2e
  - upgrade
  - conformance
  - mink8s
  - unit

# GCS bucket holding build artifacts.
gcs:
  bucket: "kubernetes-ci-logs"

# UI branding. Frontend reads these from data/manifest.json at runtime.
branding:
  title: "CAPI Prow Dashboard"
  base_path: "/capi-prow-ai-dashboard"
  site_url: "https://willie-yao.github.io/capi-prow-ai-dashboard"
  source_repo:
    owner: "kubernetes-sigs"
    name: "cluster-api"

# CAPI core E2E uses spec-name prefixes (quick-start, md-rollout, etc.)
# without a common prefix, so leave empty and let the collector fall back
# to its generic substring matcher.
capi:
  cluster_name_prefix: ""

# Per-build artifact collector.
artifacts:
  collector: "capi"

# AI analysis settings. Endpoint and model come from repo variables
# (vars.AI_MODEL / vars.AI_ENDPOINT) wired in .github/workflows/deploy.yml.
ai:
  module: "capi"

  # Per-failure evidence collected by the capi module before each AI call.
  # CAPD jobs add kern.log to the engine default machine_logs set.
  evidence:
    machine_logs:
      - kubelet.log
      - containerd.log
      - journal.log
      - kern.log

  # Agentic mode lets the LLM browse GCS itself via function-calling tools.
  # always: true routes every failure through agentic for end-to-end
  # validation; expect ~10x tokens / ~7x wall clock vs curator mode.
  agentic:
    enabled: true
    always: true
